# AdonisCommerce Docker Services (PostgreSQL + Redis only)
# Use this for database and cache services
# The app runs locally with 'pnpm dev'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-adoniscommerce}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-adoniscommerce}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default_network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-adoniscommerce}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default_network:
    driver: bridge